<!--
  FreeReverseColoring.com — Full Wordmark (Icon + Text, horizontal)
  "FreeReverseColoring.com" — one word, capital F, "Reverse" in brand purple
  Tagline: "The canvas is ready. You bring the story."
-->
<svg
  viewBox="0 0 340 48"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  aria-label="FreeReverseColoring.com"
>
  <!-- === LOGOMARK (32x32, vertically centered) === -->
  <g transform="translate(4, 4)">
    <!-- Watercolor wash -->
    <ellipse cx="15" cy="18" rx="10.5" ry="9"
             transform="rotate(-8 15 18)"
             fill="#2D4A5C" fill-opacity="0.22"/>
    <ellipse cx="13" cy="15" rx="8.5" ry="7"
             transform="rotate(5 13 15)"
             fill="#B8C9C4" fill-opacity="0.35"/>
    <ellipse cx="20" cy="21" rx="6" ry="4.5"
             transform="rotate(-15 20 21)"
             fill="#A06D63" fill-opacity="0.20"/>

    <!-- Emerging pen line -->
    <path d="M7 10 C11 12, 14 16, 18 20 C20 22, 22 24, 25 26"
          stroke="#1C1917" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Nib -->
    <path d="M7 10 L5.5 7.5 L7 5 L8.5 7.5 Z"
          fill="#2D4A5C" stroke="#2D4A5C"
          stroke-width="0.5" stroke-linejoin="round"/>

    <!-- Second stroke -->
    <path d="M12 24 C15 21.5, 18 20, 22 18"
          stroke="#A06D63" stroke-opacity="0.70"
          stroke-width="1.1" stroke-linecap="round"
          stroke-dasharray="1.5 2"/>
  </g>

  <!-- === WORDMARK: FreeReverseColoring.com === -->
  <text
    x="44" y="22"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="18" font-weight="700" letter-spacing="-0.3"
  >
    <tspan fill="#2D2B3D">Free</tspan><tspan fill="#9B7BC7">Reverse</tspan><tspan fill="#2D2B3D">Coloring</tspan><tspan fill="#2D2B3D" fill-opacity="0.6">.com</tspan>
  </text>

  <!-- Tagline -->
  <text
    x="44" y="38"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11" font-weight="400" font-style="italic"
    fill="#6B687D" letter-spacing="0.2"
  >The canvas is ready. You bring the story.</text>
</svg>
