<!--
  FreeReverseColoring.com — Monochrome Wordmark
  Single color (#2D2B3D). For print watermarks, legal footers, embossing.
-->
<svg
  viewBox="0 0 340 48"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  aria-label="FreeReverseColoring.com"
>
  <g transform="translate(4, 4)">
    <ellipse cx="15" cy="18" rx="10.5" ry="9"
             transform="rotate(-8 15 18)"
             fill="#2D2B3D" fill-opacity="0.08"/>
    <ellipse cx="13" cy="15" rx="8.5" ry="7"
             transform="rotate(5 13 15)"
             fill="#2D2B3D" fill-opacity="0.06"/>
    <ellipse cx="20" cy="21" rx="6" ry="4.5"
