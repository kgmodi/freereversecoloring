<!--
  FreeReverseColoring — Logomark / Icon
  Concept: "The Emerging Line" (v2)

  A watercolor wash (three overlapping organic blobs in the new palette)
  with a single crisp pen stroke drawn across it, and a minimal nib at origin.

  Brand palette v2:
    Ink Indigo  #2D4A5C  — primary
    Sage Wash   #B8C9C4  — secondary wash tone
    Terracotta  #A06D63  — warm accent
    Ink Black   #1C1917  — the stroke / pen line
    Parchment   #FAF7F2  — light bg

  Scales cleanly from 16px to 512px+.
  For browser tabs use logo-favicon.svg (has parchment rounded-rect bg).
-->
<svg
  viewBox="0 0 32 32"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  aria-label="FreeReverseColoring icon"
>
  <!-- Watercolor wash — three organic rotated ellipses, intentionally irregular -->
  <!-- Ink Indigo: largest, anchors the composition -->
  <ellipse cx="15" cy="18" rx="10.5" ry="9"
           transform="rotate(-8 15 18)"
           fill="#2D4A5C" fill-opacity="0.22"/>
  <!-- Sage Wash: offset upper-left, creates depth and the "wet" feeling -->
  <ellipse cx="13" cy="15" rx="8.5" ry="7"
           transform="rotate(5 13 15)"
           fill="#B8C9C4" fill-opacity="0.35"/>
  <!-- Terracotta: lower-right edge, warm accent to balance -->
  <ellipse cx="20" cy="21" rx="6" ry="4.5"
           transform="rotate(-15 20 21)"
           fill="#A06D63" fill-opacity="0.20"/>

  <!-- The emerging line — single confident pen stroke crossing the wash -->
  <!-- Starts above-left (at nib), exits lower-right. This IS the product: your line on their color. -->
  <path d="M7 10 C11 12, 14 16, 18 20 C20 22, 22 24, 25 26"
        stroke="#1C1917" stroke-width="1.75"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pen nib — small diamond sitting at the stroke origin (top-left) -->
  <!-- At favicon scale reads as a small anchor point; at larger sizes reveals as a nib -->
  <path d="M7 10 L5.5 7.5 L7 5 L8.5 7.5 Z"
        fill="#2D4A5C" stroke="#2D4A5C"
        stroke-width="0.5" stroke-linejoin="round"/>

  <!-- Second stroke — terracotta, dashed, shorter — implies drawing in progress -->
  <path d="M12 24 C15 21.5, 18 20, 22 18"
        stroke="#A06D63" stroke-opacity="0.70"
        stroke-width="1.1" stroke-linecap="round"
        stroke-dasharray="1.5 2"/>
</svg>
