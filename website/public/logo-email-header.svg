<!--
  FreeReverseColoring.com — Email Header Logo (inverted, for dark background)
  "FreeReverseColoring.com" with "Reverse" in lighter purple tint
  Tagline: "The canvas is ready. You bring the story."
-->
<svg
  viewBox="0 0 360 52"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  aria-label="FreeReverseColoring.com"
  style="display:block;margin:0 auto;"
>
  <!-- Logomark — inverted, white on dark -->
  <g transform="translate(8, 10)">
    <ellipse cx="15" cy="18" rx="10.5" ry="9"
             transform="rotate(-8 15 18)"
             fill="white" fill-opacity="0.10"/>
    <ellipse cx="13" cy="15" rx="8.5" ry="7"
             transform="rotate(5 13 15)"
             fill="white" fill-opacity="0.08"/>
    <ellipse cx="20" cy="21" rx="6" ry="4.5"
             transform="rotate(-15 20 21)"
             fill="white" fill-opacity="0.06"/>
    <path d="M7 10 C11 12, 14 16, 18 20 C20 22, 22 24, 25 26"
          stroke="white" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M7 10 L5.5 7.5 L7 5 L8.5 7.5 Z"
          fill="white" stroke="white"
          stroke-width="0.5" stroke-linejoin="round"/>
    <path d="M12 24 C15 21.5, 18 20, 22 18"
          stroke="#D4E4E0" stroke-opacity="0.55"
          stroke-width="1.1" stroke-linecap="round"
          stroke-dasharray="1.5 2"/>
  </g>

  <!-- Wordmark — white, "Reverse" slightly lighter/tinted -->
  <text
    x="52" y="28"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="20" font-weight="700" letter-spacing="-0.3"
  >
    <tspan fill="white">Free</tspan><tspan fill="rgba(255,255,255,0.7)">Reverse</tspan><tspan fill="white">Coloring</tspan><tspan fill="rgba(255,255,255,0.5)">.com</tspan>
  </text>

  <!-- Tagline -->
  <text
    x="52" y="44"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="10" font-weight="400" font-style="italic" letter-spacing="0.3"
    fill="white" fill-opacity="0.42"
  >The canvas is ready. You bring the story.</text>
</svg>
