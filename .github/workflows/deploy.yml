name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_cdk:
        description: Deploy CDK stack
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CdkFreeReverseColoringRepo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: CdkFreeReverseColoringRepo/package-lock.json

      - run: npm ci

      - name: TypeScript compile check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: CDK synth
        run: npx cdk synth --no-lookups

  deploy-website:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync website to S3
        run: aws s3 sync website/out/ s3://cdkfreereversecoloringrep-freereversecolorings3buc-gwdgylokt0u5/ --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E35LT8D7C87IZR --paths "/*"

  deploy-cdk:
    needs: validate
    if: contains(github.event.head_commit.message, '[cdk-deploy]') || (github.event_name == 'workflow_dispatch' && inputs.deploy_cdk)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CdkFreeReverseColoringRepo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: CdkFreeReverseColoringRepo/package-lock.json

      - run: npm ci

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK deploy
        run: npx cdk deploy --require-approval never
