name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  cdk-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CdkFreeReverseColoringRepo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: CdkFreeReverseColoringRepo/package-lock.json

      - run: npm ci

      - name: TypeScript compile check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: CDK synth
        run: npx cdk synth --no-lookups
